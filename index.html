<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="form">
    <div class="Formcontainer">
<form id="myForm">
    <h2>Enter Your Details:</h2>

    <h3>Name:</h3>
    <input id="name" class="inp" type="text" placeholder="Name">

    <h3>Email:</h3>
    <input id="email" class="inp" type="email" placeholder="Email">

    <h3>Phone:</h3>
    <input id="phone" class="inp" type="tel" placeholder="Phone">

    <h3>Password:</h3>
    <input id="password" class="inp" type="password" placeholder="Password">

    <h3>Date of birth:</h3>
    <input id="dob" class="inp" type="date">

    <br><br>
    <button id="btn">Submit</button>
    


</form>
    <div class="btn2">
    <button  class="show" onclick="display()">Show data</button>
        </div>

</div>
</div>


<div id="container"></div>
    <script src="node.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Cart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="body">
        <h1 id="my"> <img width="25px" height="25px" style="border-radius: 50%; cursor: pointer;" src="logo.jpeg" alt="" onclick="zoom()"> My Store</h1>

        <div class="controls">

            <input
                type="text"
                id="search"
                placeholder="Search products..."
            >

            <select id="category">
                <option value="All">All Categories</option>
                <option value="Electronics">Electronics</option>
                <option value="Fashion">Fashion</option>
                <option value="Accessories">Accessories</option>
            </select>

        </div>
    </header>

    <main>


        <section class="products">

            <h2 style="color: rgb(175, 175, 232);">Products <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="rgb(175, 175, 232)"><path d="M223.5-103.5Q200-127 200-160t23.5-56.5Q247-240 280-240t56.5 23.5Q360-193 360-160t-23.5 56.5Q313-80 280-80t-56.5-23.5Zm400 0Q600-127 600-160t23.5-56.5Q647-240 680-240t56.5 23.5Q760-193 760-160t-23.5 56.5Q713-80 680-80t-56.5-23.5ZM246-720l96 200h280l110-200H246Zm-38-80h590q23 0 35 20.5t1 41.5L692-482q-11 20-29.5 31T622-440H324l-44 80h480v80H280q-45 0-68-39.5t-2-78.5l54-98-144-304H40v-80h130l38 80Zm134 280h280-280Z"/></svg></h2>

            <div id="productContainer" class="product-grid">

            </div>

        </section>


        <aside class="cart">

            <h2 id="shCart">Shopping Cart  <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill=" rgb(85, 85, 155)"><path d="M223.5-103.5Q200-127 200-160t23.5-56.5Q247-240 280-240t56.5 23.5Q360-193 360-160t-23.5 56.5Q313-80 280-80t-56.5-23.5Zm400 0Q600-127 600-160t23.5-56.5Q647-240 680-240t56.5 23.5Q760-193 760-160t-23.5 56.5Q713-80 680-80t-56.5-23.5ZM246-720l96 200h280l110-200H246Zm-38-80h590q23 0 35 20.5t1 41.5L692-482q-11 20-29.5 31T622-440H324l-44 80h480v80H280q-45 0-68-39.5t-2-78.5l54-98-144-304H40v-80h130l38 80Zm134 280h280-280Z"/></svg></h2>

            <div id="cartContainer">

                <p>Your cart is empty.</p>

            </div>

            <div class="cart-summary">

                <h3>Total: ₹<span id="total">0</span></h3>

                <button id="clearCart">
                    Clear Cart
                </button>

            </div>

        </aside>

    </main>

    <script  src="node.js"></script>

</body>
</html>
